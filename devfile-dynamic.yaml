# devfile-dynamic.yaml — Eclipse Che workspace using UDI (no custom image)
#
# Uses the Universal Developer Image as the base. Tools are installed
# via postStart commands at workspace creation — slower startup but
# no custom image to maintain.
#
# Devfile 2.2.0 specification: https://devfile.io/docs/2.2.0/
# Requirements: FR-010, FR-011

schemaVersion: 2.2.0

metadata:
  name: unbound-force-workspace-dynamic
  version: 1.0.0

components:
  - name: dev-container
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 8Gi
      cpuLimit: "4"
      mountSources: true
      env:
        # Ollama endpoint for Dewey semantic search. Empty = keyword-only.
        # Local Podman: http://host.containers.internal:11434
        # CDE on K8s: set via Che user preferences or K8s secret
        - name: DEWEY_EMBEDDING_ENDPOINT
          value: ""
        - name: GOPATH
          value: "/home/user/go"
        - name: PATH
          value: "/home/user/go/bin:/home/user/.local/bin:$PATH"
      endpoints:
        - name: opencode-server
          targetPort: 4096
          exposure: internal
        - name: demo-http
          targetPort: 3000
          exposure: public
          protocol: https
        - name: demo-api
          targetPort: 8080
          exposure: public
          protocol: https
        - name: demo-alt
          targetPort: 8443
          exposure: public
          protocol: https

commands:
  - id: install-tools
    exec:
      component: dev-container
      commandLine: |
        # Downloads install script from containerfile repo — works with any cloned project.
        # Uses main branch (not SHA-pinned) so workspaces always get the latest tools.
        # Retry up to 3 times for transient CDN failures (rate limiting, 503s).
        for attempt in 1 2 3; do
          if curl -fsSL --max-time 60 https://raw.githubusercontent.com/unbound-force/containerfile/main/scripts/install-uf-tools.sh | bash; then
            break
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "WARNING: UF tools installation failed after 3 attempts." >&2
            echo "Check network access to raw.githubusercontent.com" >&2
            break
          fi
          echo "Install attempt $attempt failed, retrying in 5s ..."
          sleep 5
        done
        # Install OpenCode via official installer
        if ! curl -fsSL --max-time 60 https://opencode.ai/install | bash; then
          echo "WARNING: OpenCode installation failed. Check network access to opencode.ai" >&2
        fi
      workingDir: /projects

  - id: start-server
    exec:
      component: dev-container
      commandLine: "opencode serve --port 4096 --hostname 0.0.0.0"
      workingDir: /projects

  - id: init-workspace
    exec:
      component: dev-container
      commandLine: "uf init"
      workingDir: /projects

  # Composite command enforces sequential execution order.
  # postStart events are NOT guaranteed sequential per the
  # devfile spec — a composite with parallel: false is required.
  - id: post-start-sequence
    composite:
      commands:
        - install-tools
        - init-workspace
        - start-server
      parallel: false

events:
  postStart:
    - post-start-sequence
